<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Bouquet of My Love</title>
    <style>
        :root {
            --bg-dark: #0a0512;
            --panel-bg: rgba(20, 12, 32, 0.45);
            --border-glow: rgba(187, 134, 252, 0.25);
            --text-main: #f3f1f6;
            --text-muted: #a499b3;
            --accent: #ff477e;
            --accent-glow: rgba(255, 71, 126, 0.4);
            
            --rose-color: #ff2a6d;
            --rose-dark: #b3003b;
            --lily-color: #fce4ec;
            --lily-shadow: #f8bbd0;
            --sun-color: #ffb300;
            --sun-center: #5d4037;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(138, 43, 226, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 71, 126, 0.12) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px 16px;
        }

        /* Glassmorphic Container */
        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.8), inset 0 1px 2px rgba(255,255,255,0.1);
            text-align: center;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Ambient Premium Top Bar */
        .top-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .status-badge {
            background: rgba(255, 255, 255, 0.06);
            padding: 6px 12px;
            border-radius: 100px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: #39ff14;
            border-radius: 50%;
            box-shadow: 0 0 8px #39ff14;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.4;
            margin-bottom: 24px;
        }

        /* Bento Box Layout for Flowers */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .bento-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 16px;
            position: relative;
            height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s;
        }

        .bento-item:hover, .bento-item:active {
            transform: translateY(-4px);
            border-color: var(--border-glow);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Specific item alignments for bento look */
        .item-large {
            grid-column: span 2;
            height: 180px;
        }

        .item-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            margin-top: auto;
            z-index: 2;
            background: rgba(10, 5, 18, 0.6);
            padding: 4px 12px;
            border-radius: 100px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* CSS Flowers inside Bento */
        .flower-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 80%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Rose CSS */
        .rose-petals {
            position: relative;
            width: 50px;
            height: 50px;
            animation: spin-slow 20s linear infinite;
        }
        .rose-petal {
            position: absolute;
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, var(--rose-color), var(--rose-dark));
            border-radius: 50% 0 50% 50%;
            transform-origin: bottom right;
            opacity: 0.95;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.3);
        }
        .rose-petal:nth-child(1) { transform: rotate(0deg) scale(1); }
        .rose-petal:nth-child(2) { transform: rotate(72deg) scale(1); }
        .rose-petal:nth-child(3) { transform: rotate(144deg) scale(1); }
        .rose-petal:nth-child(4) { transform: rotate(216deg) scale(1); }
        .rose-petal:nth-child(5) { transform: rotate(288deg) scale(1); }
        .rose-center {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #ff0055;
            border-radius: 50%;
            top: 15px;
            left: 15px;
            box-shadow: inset 0 0 5px #000;
        }

        /* Lily CSS */
        .lily-petals {
            position: relative;
            width: 60px;
            height: 60px;
        }
        .lily-petal {
            position: absolute;
            width: 14px;
            height: 45px;
            background: linear-gradient(to top, var(--lily-shadow), var(--lily-color));
            border-radius: 50% 50% 40% 40%;
            left: 23px;
            top: 7px;
            transform-origin: center bottom;
        }
        .lily-petal:nth-child(1) { transform: rotate(0deg); }
        .lily-petal:nth-child(2) { transform: rotate(60deg); }
        .lily-petal:nth-child(3) { transform: rotate(120deg); }
        .lily-petal:nth-child(4) { transform: rotate(180deg); }
        .lily-petal:nth-child(5) { transform: rotate(240deg); }
        .lily-petal:nth-child(6) { transform: rotate(300deg); }
        .lily-center {
            position: absolute;
            width: 10px;
            height: 100%;
            display: flex;
            justify-content: center;
            top: 0; left: 25px;
        }
        .lily-stamen {
            width: 2px; height: 25px; background: #e0a417; position: absolute; top: 12px;
        }

        /* Sunflower CSS */
        .sunflower-petals {
            position: relative;
            width: 60px;
            height: 60px;
            animation: spin-slow 30s linear infinite;
        }
        .sun-petal {
            position: absolute;
            width: 10px;
            height: 26px;
            background: var(--sun-color);
            border-radius: 50% 50% 0 0;
            left: 25px;
            top: 4px;
            transform-origin: bottom center;
        }
        /* Programmatic rotation helper for sunflower petals */
        .sun-petal:nth-child(1) { transform: rotate(0deg); }
        .sun-petal:nth-child(2) { transform: rotate(30deg); }
        .sun-petal:nth-child(3) { transform: rotate(60deg); }
        .sun-petal:nth-child(4) { transform: rotate(90deg); }
        .sun-petal:nth-child(5) { transform: rotate(120deg); }
        .sun-petal:nth-child(6) { transform: rotate(150deg); }
        .sun-petal:nth-child(7) { transform: rotate(180deg); }
        .sun-petal:nth-child(8) { transform: rotate(210deg); }
        .sun-petal:nth-child(9) { transform: rotate(240deg); }
        .sun-petal:nth-child(10) { transform: rotate(270deg); }
        .sun-petal:nth-child(11) { transform: rotate(300deg); }
        .sun-petal:nth-child(12) { transform: rotate(330deg); }
        .sun-center {
            position: absolute;
            width: 22px;
            height: 22px;
            background: var(--sun-center);
            border-radius: 50%;
            top: 19px;
            left: 19px;
            border: 2px dashed #e65100;
        }

        .dual-sunflowers {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        @keyframes spin-slow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Daily Random Flower Handing Section */
        .daily-delivery-box {
            background: linear-gradient(135deg, rgba(255, 71, 126, 0.08), rgba(138, 43, 226, 0.08));
            border: 1px solid rgba(255, 71, 126, 0.2);
            border-radius: 24px;
            padding: 20px;
            margin-top: 8px;
            text-align: center;
            position: relative;
        }

        .delivery-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 12px;
        }

        .action-btn {
            background: linear-gradient(135deg, var(--accent) 0%, #b31460 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 8px 20px var(--accent-glow);
            transition: transform 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .action-btn:active {
            transform: scale(0.96);
        }

        /* Live Handing Interactive Stage */
        .handing-stage {
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
            position: relative;
        }

        /* Exquisite Vector-like CSS illustration of Boy & Girl Handing */
        .couple-illustration {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
            position: relative;
        }

        .avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            position: relative;
            background: #2a1b40;
            border: 2px solid rgba(255,255,255,0.2);
        }

        /* Cute Boy Avatar Detail */
        .avatar.boy {
            border-color: #4a90e2;
            box-shadow: 0 0 15px rgba(74, 144, 226, 0.3);
        }
        .avatar.boy::before {
            content: "👦🏻";
            font-size: 32px;
            position: absolute;
            top: 4px; left: 8px;
        }

        /* Cute Girl Avatar Detail */
        .avatar.girl {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .avatar.girl::before {
            content: "👧🏻";
            font-size: 32px;
            position: absolute;
            top: 4px; left: 8px;
        }

        .hand-path {
            flex-grow: 1;
            height: 2px;
            background: dashed rgba(255,255,255,0.2);
            position: relative;
            margin: 0 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Center Display for Handed Flower */
        .active-gift-flower {
            position: absolute;
            transform: scale(0.7);
            transition: all 0.5s ease-in-out;
            opacity: 0;
            top: -25px;
        }

        .active-gift-flower.show {
            opacity: 1;
            transform: scale(1) translateY(-5px);
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: scale(1) translateY(0px); }
            50% { transform: scale(1.05) translateY(-8px); }
        }

        .gift-message {
            margin-top: 10px;
            font-size: 0.9rem;
            font-style: italic;
            color: #ff85a2;
            min-height: 20px;
        }

        /* Particle Splash Effects */
        .sparkle {
            position: absolute;
            pointer-events: none;
            background: white;
            border-radius: 50%;
            animation: fly-out 0.8s ease-out forwards;
        }

        @keyframes fly-out {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="top-status">
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>Connected</span>
            </div>
            <div id="current-date"></div>
        </div>

        <header>
            <h1>Your Digital Garden</h1>
            <p>Every single petal here carries a piece of my heart. Since I can't send them physically today, I grew these just for you.</p>
        </header>

        <div class="bento-grid">
            <div class="bento-item">
                <div class="flower-canvas">
                    <div class="rose-petals">
                        <div class="rose-petal"></div>
                        <div class="rose-petal"></div>
                        <div class="rose-petal"></div>
                        <div class="rose-petal"></div>
                        <div class="rose-petal"></div>
                        <div class="rose-center"></div>
                    </div>
                </div>
                <span class="item-label">The Classic Rose</span>
            </div>

            <div class="bento-item">
                <div class="flower-canvas">
                    <div class="lily-petals">
                        <div class="lily-petal"></div>
                        <div class="lily-petal"></div>
                        <div class="lily-petal"></div>
                        <div class="lily-petal"></div>
                        <div class="lily-petal"></div>
                        <div class="lily-petal"></div>
                        <div class="lily-center"><div class="lily-stamen"></div></div>
                    </div>
                </div>
                <span class="item-label">Elegant Lily</span>
            </div>

            <div class="bento-item item-large">
                <div class="flower-canvas">
                    <div class="dual-sunflowers">
                        <div class="sunflower-petals">
                            <div class="sun-petal"></div><div class="sun-petal"></div><div class="sun-petal"></div>
                            <div class="sun-petal"></div><div class="sun-petal"></div><div class="sun-petal"></div>
                            <div class="sun-petal"></div><div class="sun-petal"></div><div class="sun-petal"></div>
                            <div class="sun-petal"></div><div class="sun-petal"></div><div class="sun-petal"></div>
                            <div class="sun-center"></div>
                        </div>
                        <div class="sunflower-petals" style="animation-duration: 25s; transform: scale(0.95);">
                            <div class="sun-petal"></div><div class="sun-petal"></div><div class="sun-petal"></div>
                            <div class="sun-petal"></div><div class="sun-petal"></div><div class="sun-petal"></div>
                            <div class="sun-petal"></div><div class="sun-petal"></div><div class="sun-petal"></div>
                            <div class="sun-petal"></div><div class="sun-petal"></div><div class="sun-petal"></div>
                            <div class="sun-center"></div>
                        </div>
                    </div>
                </div>
                <span class="item-label">Our Happy Sunflowers</span>
            </div>
        </div>

        <div class="daily-delivery-box">
            <div class="delivery-title">Daily Flower From Me To You</div>
            <button class="action-btn" onclick="handFlower(event)">Receive Today's Flower</button>
            
            <div class="handing-stage">
                <div class="couple-illustration">
                    <div class="avatar boy"></div>
                    <div class="hand-path">
                        <div class="active-gift-flower" id="giftContainer"></div>
                    </div>
                    <div class="avatar girl"></div>
                </div>
            </div>
            <div class="gift-message" id="giftMsg">Tap the button to accept my daily gesture...</div>
        </div>
    </div>

    <script>
        // Set live display date
        const options = { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('en-US', options);

        // Flower configuration arrays
        const flowerTypes = [
            {
                name: 'Rose',
                msg: '“A Rose for my beautiful girl. Missing you every single second today.” 🌹',
                html: `<div class="rose-petals"><div class="rose-petal"></div><div class="rose-petal"></div><div class="rose-petal"></div><div class="rose-petal"></div><div class="rose-petal"></div><div class="rose-center"></div></div>`
            },
            {
                name: 'Lily',
                msg: '“An elegant Lily for you. Your peace and grace make my life beautiful.” 🌸',
                html: `<div class="lily-petals"><div class="lily-petal"></div><div class="lily-petal"></div><div class="lily-petal"></div><div class="lily-petal"></div><div class="lily-petal"></div><div class="lily-petal"></div><div class="lily-center"><div class="lily-stamen"></div></div></div>`
            },
            {
                name: 'Sunflower',
                msg: '“A bright Sunflower because you shine brighter than everything else!” 🌻',
                html: `<div class="sunflower-petals"><div class="sun-petal"></div><div class="sun-petal"></div><div class="sun-petal"></div><div class="sun-petal"></div><div class="sun-petal"></div><div class="sun-petal"></div><div class="sun-petal"></div><div class="sun-petal"></div><div class="sun-petal"></div><div class="sun-petal"></div><div class="sun-petal"></div><div class="sun-petal"></div><div class="sun-center"></div></div>`
            }
        ];

        function handFlower(e) {
            const container = document.getElementById('giftContainer');
            const msgBox = document.getElementById('giftMsg');
            
            // Remove previous classes to restart transition cleanly
            container.classList.remove('show');
            
            // Generate random flower
            const randomIdx = Math.floor(Math.random() * flowerTypes.length);
            const chosen = flowerTypes[randomIdx];

            // Render selected custom flower element inside the handing channel
            container.innerHTML = chosen.html;
            
            setTimeout(() => {
                container.classList.add('show');
                msgBox.innerText = chosen.msg;
                createBurst(e.clientX, e.clientY);
            }, 100);
        }

        // Beautiful glass/light particles engine
        function createBurst(x, y) {
            for (let i = 0; i < 18; i++) {
                const sparkle = document.createElement('div');
                sparkle.classList.add('sparkle');
                
                // Random sizes
                const size = Math.random() * 6 + 4;
                sparkle.style.width = `${size}px`;
                sparkle.style.height = `${size}px`;
                
                // Colors fitting the premium accent theme
                const colors = ['#ff477e', '#ff85a2', '#fce4ec', '#ffb300', '#ffffff'];
                sparkle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                // Spawn position variations
                sparkle.style.left = `${window.innerWidth / 2}px`;
                sparkle.style.top = `${window.innerHeight - 200}px`;
                
                // Direction calculation coordinates
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 70 + 40;
                sparkle.style.setProperty('--mx', `${Math.cos(angle) * velocity}px`);
                sparkle.style.setProperty('--my', `${Math.sin(angle) * velocity}px`);
                
                document.body.appendChild(sparkle);
                
                setTimeout(() => {
                    sparkle.remove();
                }, 800);
            }
        }
    </script>
</body>
</html>
